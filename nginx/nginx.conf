# Единая точка входа — Nginx слушает порт 80
# Маршрутизация — /api/* → FastAPI, / → Streamlit
# Rate Limiting — не более 5 запросов в минуту с одного IP
# Балансировка нагрузки — upstream с несколькими репликами API

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Rate Limiting — зона для ограничения запросов на генерацию
    limit_req_zone $binary_remote_addr zone=generation_limit:10m rate=5r/m;

    # Балансировка нагрузки — upstream FastAPI replicas
    upstream api_backend {
        # Балансировка нагрузки — round-robin между репликами
        server api:8000;
        keepalive 32;
    }

    # Единая точка входа — основной сервер на порту 80
    server {
        listen 80;
        server_name _;

        # Маршрутизация — /api/* → FastAPI бэкенд
        location /api/ {
            # Rate Limiting — применяем к эндпоинту генерации
            limit_req zone=generation_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # WebSocket поддержка для /api/ws/*
        location /api/ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # Метрики Prometheus — не ограничиваем rate limiting
        location /metrics {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # Маршрутизация — / → Streamlit UI
        location / {
            proxy_pass http://frontend:8501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            # WebSocket для Streamlit live reload
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
